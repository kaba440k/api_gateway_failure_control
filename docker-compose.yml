name: ${COMPOSE_PROJECT_NAME:-api-gateway-failure-control}

x-app-env: &app-env
  env_file:
    - .env

services:
  envoy:
    image: envoyproxy/envoy:v1.33-latest
    volumes:
      - ./infra/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "${ENVOY_GATEWAY_PORT:-10000}:10000"
      - "${ENVOY_ADMIN_PORT:-9901}:9901"
    depends_on:
      - control-api
      - orders-service
      - payments-service
      - unstable-service

  migrate:
    <<: *app-env
    build: .
    command: alembic upgrade head
    environment:
      DATABASE_URL: ${DATABASE_URL_DOCKER:?set DATABASE_URL_DOCKER in .env}
      REDIS_URL: ${REDIS_URL_DOCKER:?set REDIS_URL_DOCKER in .env}
    depends_on:
      postgres:
        condition: service_healthy

  control-api:
    <<: *app-env
    build: .
    command: uvicorn app.control_api.main:create_app --factory --host 0.0.0.0 --port 8000
    environment:
      APP_NAME: ${CONTROL_API_APP_NAME:-control-api}
      DATABASE_URL: ${DATABASE_URL_DOCKER:?set DATABASE_URL_DOCKER in .env}
      REDIS_URL: ${REDIS_URL_DOCKER:?set REDIS_URL_DOCKER in .env}
      UPSTREAM_UNSTABLE_URL: ${UPSTREAM_UNSTABLE_URL_DOCKER:?set UPSTREAM_UNSTABLE_URL_DOCKER in .env}
      GATEWAY_URL: ${GATEWAY_URL:-http://localhost:10000}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://localhost:9090}
      GRAFANA_URL: ${GRAFANA_URL:-http://localhost:3000}
      CIRCUIT_FAILURE_THRESHOLD: ${CIRCUIT_FAILURE_THRESHOLD:-3}
      CIRCUIT_OPEN_TIMEOUT_SECONDS: ${CIRCUIT_OPEN_TIMEOUT_SECONDS:-10}
      RETRY_ATTEMPTS: ${RETRY_ATTEMPTS:-3}
      RETRY_INITIAL_DELAY_SECONDS: ${RETRY_INITIAL_DELAY_SECONDS:-0.2}
      RETRY_MAX_DELAY_SECONDS: ${RETRY_MAX_DELAY_SECONDS:-1.5}
    ports:
      - "${CONTROL_API_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  orders-service:
    <<: *app-env
    build: .
    environment:
      SERVICE_NAME: orders-service
      REDIS_URL: ${REDIS_URL_DOCKER:?set REDIS_URL_DOCKER in .env}
    depends_on:
      redis:
        condition: service_healthy

  payments-service:
    <<: *app-env
    build: .
    environment:
      SERVICE_NAME: payments-service
      REDIS_URL: ${REDIS_URL_DOCKER:?set REDIS_URL_DOCKER in .env}
    depends_on:
      redis:
        condition: service_healthy

  unstable-service:
    <<: *app-env
    build: .
    environment:
      SERVICE_NAME: unstable-service
      REDIS_URL: ${REDIS_URL_DOCKER:?set REDIS_URL_DOCKER in .env}
    depends_on:
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in .env}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      - envoy
      - control-api
      - orders-service
      - payments-service
      - unstable-service

  grafana:
    image: grafana/grafana:11.2.2
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?set GRAFANA_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - prometheus

  frontend:
    image: nginx:1.27-alpine
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - envoy

volumes:
  postgres-data:
  grafana-data:
