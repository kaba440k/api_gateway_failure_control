admin:
  address:
    socket_address:
      address: 0.0.0.0
      port_value: 9901

static_resources:
  listeners:
    - name: gateway_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 10000
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: api_gateway
                access_log:
                  - name: envoy.access_loggers.stdout
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.access_loggers.stream.v3.StdoutAccessLog
                route_config:
                  name: gateway_routes
                  virtual_hosts:
                    - name: diploma_services
                      domains: ["*"]
                      routes:
                        - match:
                            prefix: "/control/"
                          route:
                            cluster: control_api
                            prefix_rewrite: "/"
                            timeout: 5s
                        - match:
                            prefix: "/protected/unstable"
                          route:
                            cluster: control_api
                            prefix_rewrite: "/proxy/unstable"
                            timeout: 8s
                        - match:
                            prefix: "/api/orders"
                          route:
                            cluster: orders_service
                            prefix_rewrite: "/orders"
                            timeout: 2s
                        - match:
                            prefix: "/api/payments"
                          route:
                            cluster: payments_service
                            prefix_rewrite: "/payments"
                            timeout: 2s
                        - match:
                            prefix: "/api/unstable"
                          route:
                            cluster: unstable_service
                            prefix_rewrite: "/unstable"
                            timeout: 2s
                            retry_policy:
                              retry_on: "5xx,connect-failure,reset,refused-stream"
                              num_retries: 2
                              per_try_timeout: 1s
                        - match:
                            prefix: "/"
                          direct_response:
                            status: 200
                            body:
                              inline_string: "API Gateway Failure Control is running\n"
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    - name: control_api
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: control_api
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: control-api
                      port_value: 8000
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 100
            max_pending_requests: 100
            max_requests: 200
            max_retries: 3

    - name: orders_service
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: orders_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: orders-service
                      port_value: 8000

    - name: payments_service
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: payments_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: payments-service
                      port_value: 8000

    - name: unstable_service
      connect_timeout: 1s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: unstable_service
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: unstable-service
                      port_value: 8000
      circuit_breakers:
        thresholds:
          - priority: DEFAULT
            max_connections: 10
            max_pending_requests: 10
            max_requests: 30
            max_retries: 3
      outlier_detection:
        consecutive_5xx: 3
        interval: 5s
        base_ejection_time: 15s
        max_ejection_percent: 100
